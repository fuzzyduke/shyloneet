<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select a Test - Shylo NEET V1 Lite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #e2e8f0;
            --badge-bg: #f1f5f9;
            --badge-text: #475569;
            --badge-active-bg: #dbeafe;
            --badge-active-text: #1d4ed8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2rem;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #cbd5e1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            margin-right: 1rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: var(--badge-bg);
            color: var(--badge-text);
            white-space: nowrap;
        }

        .badge.active {
            background-color: var(--badge-active-bg);
            color: var(--badge-active-text);
        }

        .card-desc {
            color: var(--text-muted);
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.75rem 1.5rem;
            text-align: center;
            font-weight: 500;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.15s ease;
            text-decoration: none;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .subjects-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .subject-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 500;
            background-color: var(--badge-bg);
            color: var(--badge-text);
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Select a Test</h1>
            <p class="subtitle">Choose a past paper to practice with questions and answer keys.</p>
        </header>

        <div id="papers-grid" class="grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        async function loadPapers() {
            const grid = document.getElementById('papers-grid');
            try {
                const response = await fetch('data/papers.json');
                if (!response.ok) throw new Error('Failed to fetch papers');
                const papers = await response.json();

                papers.forEach(paper => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const subjectsHtml = paper.subjects.map(sub => `<span class="subject-badge">${sub}</span>`).join('');
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <h2 class="card-title">${paper.title}</h2>
                            <span class="badge">${paper.year}</span>
                        </div>
                        <div class="subjects-list">${subjectsHtml}</div>
                        <p class="card-desc">${paper.type} • ${paper.durationMinutes} mins • ${paper.totalMarks} marks</p>
                        <a href="test.html?paper=${paper.id}" class="btn btn-primary">Start Test</a>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = `<p class="card-desc" style="text-align:center; grid-column: 1/-1;">Failed to load papers. Please try again later.</p>`;
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadPapers);
    </script>
</body>
</html>
