<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NEET Vault AI</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 5rem auto;
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--background);
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">📚 NEET Vault</a>
    </header>
    <main class="container">
        <div class="login-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Login</h2>
            <div id="error-msg" style="color: #dc2626; margin-bottom: 1rem; text-align: center;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const formData = new URLSearchParams();
            formData.append('username', u);
            formData.append('password', p);
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });
                
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('auth_token', data.access_token);
                    localStorage.setItem('auth_role', data.role);
                    localStorage.setItem('auth_user', u);
                    
                    if (data.role === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/practice.html';
                    }
                } else {
                    const data = await res.json();
                    document.getElementById('error-msg').innerText = data.detail || 'Login failed';
                }
            } catch (err) {
                document.getElementById('error-msg').innerText = 'Network error';
            }
        });
    </script>
</body>
</html>
