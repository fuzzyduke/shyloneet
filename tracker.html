<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEET Vault | Practice Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div id="nav-placeholder"></div>
    
    <div style="margin-bottom: 2rem;">
      <h1>Practice Score Tracker</h1>
      <p class="text-muted">Visualize your progress across previous year papers.</p>
    </div>

    <div class="card" id="tracker-container">
      <!-- Tracker bars will be injected here via app.js -->
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderNav();
      initTracker();
    });
  </script>
</body>
</html>
